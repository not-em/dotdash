<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morse Code</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f8f8f8;
    color: #111;
    font-family: system-ui, sans-serif;
    font-size: 15px;
    padding: 2rem 1rem;
  }

  .wrap {
    max-width: 620px;
    margin: 0 auto;
  }

  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .title-block {
    min-width: 0;
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 600;
    margin-bottom: 0.25rem;
  }

  .subtitle {
    color: #666;
    font-size: 0.85rem;
  }

  .repo-link {
    color: #555;
    font-size: 0.85rem;
    text-decoration: none;
    white-space: nowrap;
    border: 1px solid #ddd;
    border-radius: 999px;
    padding: 0.4rem 0.8rem;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
  }

  .repo-link:hover {
    color: #111;
    background: #fff;
    border-color: #bbb;
  }

  .tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    border-bottom: 1px solid #ddd;
  }

  .tab {
    font-size: 0.9rem;
    padding: 0.5rem 1.1rem;
    background: none;
    border: 1px solid transparent;
    border-bottom: none;
    cursor: pointer;
    color: #666;
    border-radius: 4px 4px 0 0;
    position: relative;
    bottom: -1px;
  }

  .tab.active {
    background: #f8f8f8;
    border-color: #ddd;
    color: #111;
    font-weight: 500;
  }

  .tab:hover:not(.active) { color: #111; }

  .panel { display: none; }
  .panel.active { display: block; }

  label {
    display: block;
    font-size: 0.8rem;
    color: #555;
    margin-bottom: 0.35rem;
    font-weight: 500;
  }

  .field-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
    margin-bottom: 0.35rem;
  }

  .field-header label {
    margin-bottom: 0;
  }

  textarea {
    width: 100%;
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 0.65rem 0.75rem;
    font-family: monospace;
    font-size: 0.95rem;
    resize: vertical;
    min-height: 80px;
    outline: none;
    background: #fff;
    color: #111;
  }
  textarea:focus { border-color: #555; }

  .field { margin-bottom: 1.1rem; }

  .output-box {
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 4px;
    min-height: 56px;
    padding: 0.65rem 0.75rem;
    font-family: monospace;
    font-size: 1rem;
    line-height: 1.7;
    color: #111;
    word-break: break-all;
    white-space: pre-wrap;
  }

  .wpm-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0;
    flex: 1 1 260px;
    min-width: 240px;
  }
  .wpm-row label { margin: 0; white-space: nowrap; }
  input[type=range] { flex: 1; cursor: pointer; accent-color: #333; }
  .wpm-val { font-size: 0.85rem; color: #444; min-width: 3.5rem; text-align: right; }

  .btn-row {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }

  .output-actions {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 0.75rem;
  }

  button {
    font-size: 0.85rem;
    padding: 0.5rem 1.1rem;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid #bbb;
    background: #fff;
    color: #111;
    transition: background 0.12s;
  }
  button:hover { background: #eee; }
  button.primary { background: #111; color: #fff; border-color: #111; }
  button.primary:hover { background: #333; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .error {
    font-size: 0.8rem;
    color: #b00;
    margin-bottom: 0.75rem;
    display: none;
  }
  .error.visible { display: block; }

  .divider {
    text-align: center;
    color: #bbb;
    margin: 1.25rem 0;
    letter-spacing: 0.3em;
  }

  footer {
    margin-top: 3rem;
    font-size: 0.75rem;
    color: #aaa;
    text-align: center;
    border-top: 1px solid #e5e5e5;
    padding-top: 1rem;
  }

  @media (max-width: 520px) {
    .header {
      flex-direction: column;
      align-items: stretch;
    }

    .repo-link {
      align-self: flex-end;
    }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="title-block">
      <h1>Morse Code</h1>
      <p class="subtitle">Encode, decode, listen to and download ITU standard Morse code</p>
    </div>
    <a class="repo-link" href="https://github.com/not-em/dotdash" target="_blank" rel="noreferrer">GitHub ↗</a>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('encode')">Encode</button>
    <button class="tab" onclick="switchTab('decode')">Decode</button>
  </div>

  <!-- ENCODE -->
  <div class="panel active" id="panel-encode">
    <div class="field">
      <label for="enc-input">Plain text</label>
      <textarea id="enc-input" rows="3" placeholder="Type your message here..."></textarea>
    </div>

    <div class="btn-row">
      <button class="primary" type="button" onclick="doEncode()">Encode</button>
    </div>
    <p class="error" id="enc-error"></p>

    <div class="divider">· · ·</div>

    <div class="field">
      <div class="field-header">
        <label>Morse output</label>
        <button id="copy-btn" type="button" onclick="copyOutput()" disabled>Copy</button>
      </div>
      <div class="output-box" id="enc-output">—</div>
      <div class="output-actions">
        <div class="wpm-row">
          <label for="wpm">Speed</label>
          <input type="range" id="wpm" min="5" max="40" value="20"
                 oninput="document.getElementById('wpm-val').textContent = this.value + ' wpm'">
          <span class="wpm-val" id="wpm-val">20 wpm</span>
        </div>
        <button id="play-btn" type="button" onclick="playAudio()" aria-label="Play audio" aria-pressed="false" disabled>▶ Play</button>
        <button id="dl-btn" type="button" onclick="downloadAudio()" disabled>↓ Download MP3</button>
      </div>
    </div>
  </div>

  <!-- DECODE -->
  <div class="panel" id="panel-decode">
    <div class="field">
      <label for="dec-input">Morse code — dots and dashes, spaces between letters, / between words</label>
      <textarea id="dec-input" rows="3" placeholder="... --- ..."></textarea>
    </div>

    <div class="btn-row">
      <button class="primary" onclick="doDecode()">Decode</button>
    </div>
    <p class="error" id="dec-error"></p>

    <div class="divider">· · ·</div>

    <div class="field">
      <label>Plain text output</label>
      <div class="output-box" id="dec-output">—</div>
    </div>
  </div>

  <footer>Morse Code Tool · ITU Standard</footer>
</div>

<script>
  let currentAudioBlob = null;
  let currentAudio = null;
  let currentAudioUrl = null;
  let copyResetTimer = null;

  function updatePlayButton(isPlaying) {
    const playBtn = document.getElementById('play-btn');
    playBtn.textContent = isPlaying ? '❚❚ Pause' : '▶ Play';
    playBtn.setAttribute('aria-label', isPlaying ? 'Pause audio' : 'Play audio');
    playBtn.setAttribute('aria-pressed', isPlaying ? 'true' : 'false');
  }

  function releaseCurrentAudio() {
    if (currentAudio) {
      currentAudio.pause();
      currentAudio.src = '';
      currentAudio = null;
    }
    if (currentAudioUrl) {
      URL.revokeObjectURL(currentAudioUrl);
      currentAudioUrl = null;
    }
    updatePlayButton(false);
  }

  function prepareAudioPlayer() {
    if (!currentAudioBlob) return null;
    if (currentAudio) return currentAudio;

    currentAudioUrl = URL.createObjectURL(currentAudioBlob);
    currentAudio = new Audio(currentAudioUrl);
    currentAudio.addEventListener('play', () => updatePlayButton(true));
    currentAudio.addEventListener('pause', () => {
      if (!currentAudio.ended) updatePlayButton(false);
    });
    currentAudio.addEventListener('ended', () => {
      if (currentAudio) currentAudio.currentTime = 0;
      updatePlayButton(false);
    });

    return currentAudio;
  }

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0) === (name === 'encode'));
    });
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
  }

  async function doEncode() {
    const text = document.getElementById('enc-input').value.trim();
    const err  = document.getElementById('enc-error');
    err.className = 'error';
    if (!text) { err.textContent = 'Please enter some text first.'; err.className = 'error visible'; return; }

    const res  = await fetch('/api/encode', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({text}) });
    const data = await res.json();
    if (data.error) { err.textContent = data.error; err.className = 'error visible'; return; }
    document.getElementById('enc-output').textContent = data.morse;
    document.getElementById('copy-btn').disabled = !data.morse || data.morse === '—';
    resetCopyButton();

    releaseCurrentAudio();
    currentAudioBlob = null;
    document.getElementById('play-btn').disabled = true;
    document.getElementById('dl-btn').disabled   = true;
    updatePlayButton(false);

    const wpm = document.getElementById('wpm').value;
    const ar  = await fetch('/api/audio', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({text, wpm: parseInt(wpm)}) });
    if (ar.ok) {
      currentAudioBlob = await ar.blob();
      document.getElementById('play-btn').disabled = false;
      document.getElementById('dl-btn').disabled   = false;
      updatePlayButton(false);
    }
  }

  function fallbackCopyText(text) {
    const input = document.createElement('textarea');
    input.value = text;
    input.setAttribute('readonly', '');
    input.style.position = 'absolute';
    input.style.left = '-9999px';
    document.body.appendChild(input);
    input.select();
    input.setSelectionRange(0, input.value.length);
    const copied = document.execCommand('copy');
    document.body.removeChild(input);
    if (!copied) throw new Error('copy failed');
  }

  function setCopyButtonLabel(label) {
    const btn = document.getElementById('copy-btn');
    btn.textContent = label;
    clearTimeout(copyResetTimer);
    copyResetTimer = setTimeout(resetCopyButton, 1500);
  }

  function resetCopyButton() {
    document.getElementById('copy-btn').textContent = 'Copy';
  }

  async function copyOutput() {
    const output = document.getElementById('enc-output').textContent.trim();
    if (!output || output === '—') return;

    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(output);
      } else {
        fallbackCopyText(output);
      }
      setCopyButtonLabel('Copied');
    } catch (error) {
      try {
        fallbackCopyText(output);
        setCopyButtonLabel('Copied');
      } catch (fallbackError) {
        setCopyButtonLabel('Copy failed');
      }
    }
  }

  function playAudio() {
    if (!currentAudioBlob) return;
    const audio = prepareAudioPlayer();
    if (!audio) return;

    if (audio.paused) {
      audio.play().catch(() => updatePlayButton(false));
    } else {
      audio.pause();
    }
  }

  function downloadAudio() {
    if (!currentAudioBlob) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(currentAudioBlob);
    a.download = 'morse.mp3';
    a.click();
  }

  async function doDecode() {
    const morse = document.getElementById('dec-input').value.trim();
    const err   = document.getElementById('dec-error');
    err.className = 'error';
    if (!morse) { err.textContent = 'Please enter some morse code first.'; err.className = 'error visible'; return; }

    const res  = await fetch('/api/decode', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({morse}) });
    const data = await res.json();
    if (data.error) { err.textContent = data.error; err.className = 'error visible'; return; }
    document.getElementById('dec-output').textContent = data.text;
  }

  document.getElementById('enc-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) doEncode();
  });
</script>
</body>
</html>
